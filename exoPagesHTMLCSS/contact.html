<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact</title>
</head>
<body>
    <header>
        <img src="https://picsum.photos/1000/200" alt=" ">
        <h1>Contactez-moi !</h1>

        <nav>
            <ul>
                <li><a href="./accueil.html">Accueil</a></li>
                <li><a href="./blog.html">Blog</a></li>
                <li><a href="./galerie.html">Galerie</a></li>
                <li><a href="./contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <fieldset>
            <legend>Contact</legend>
            <form action="#" method="post">
                <p>
                <label for="nom">Nom:* </label>
                <input type="text" id="nom" placeholder="EX : Robert" required>
                </p>

                <p>
                <label for="email">E-mail:* </label>
                <input type="text" id="email" placeholder="EX : monMail@FAI.com" required>
                </p>

                <label for="comments">Laissez un commentaire :</label>
                <p>
                <textarea name="comments" id="comments" placeholder="Je dépose mon avis :)" rows="10" cols="70"></textarea>
                </p>

                <input type="checkbox" checked>
                    <label for="checkbox">Envoyer une copie par E-mail !</label>
                
                <p>
                <button type="submit">Envoyer</button>
                <button type="reset">Reset</button>
                </p>
            </form>
        </fieldset>
    </main>
</body>
</html>
