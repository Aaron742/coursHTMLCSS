<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <form action="#" method="post">
        <fieldset>
            <legend>Info personnelles</legend>
            <label for="prenom">Prénom :</label>
            <input type="text" name="Prénom" placeholder="EX : Jacques" maxlength="20" minlength="2" id="prenom">
            <br>

            <label for="nom">Nom :</label>
            <input type="text" name="Nom" placeholder="EX : Dubois" maxlength="20" minlength="2" id="nom">
            <br>

            <label for="email">E-mail :</label>
            <input type="email" name="email" placeholder="EX : monMail@FAI.com" id="email">
            <br>

            <label for="tel">Numéro :</label>
            <input type="tel" name="tel" placeholder="EX : 00.11.22.33.44" id="tel">
            <br>

            <label for="password">Mot de passe :</label>
            <input type="text" name="Password" placeholder="EX : P@ssw4rd" minlength="8" maxlength="30" id="password">
            <br>

            <label for="age">Age :</label>
            <input type="text" name="age" placeholder="EX : 15" id="age">
            <br>

            <label for="comments">Laissez un commentaire:</label>
            <br>

            <textarea name="comments" placeholder="J'adore ce que vous faites !" rows="10" cols="70" id="comments"></textarea>
            <br>

            <label for="date">Date de mon commentaire :</label>
            <input type="date" id="date">
            <br>
            
            <label for="photo">Ma photo :</label>
            <input type="file" accept=".png, .jpg, .gif" id="file">
        </fieldset>
        <br>
        <fieldset>
            <legend>Vous préférez:</legend>
            <input type="checkbox" checked>
                <label for="checkbox">Le HTML</label>
            <br>

            <input type="checkbox">
                <label for="checkbox">Le CSS</label>
            <br>

            <input type="checkbox">
                <label for="checkbox">Le JavaScript</label>
            <br>

            <input type="checkbox">
                <label for="checkbox">Ne rien faire</label>
        </fieldset>

        <fieldset>
            <legend>Vous vous levez :</legend>
            <input type="radio" id="radio1" name="radio" value="radio1" checked>
                <label for="radio1">Le matin</label>
            <br>

            <input type="radio" id="radio2" name="radio" value="radio2">
                <label for="radio1">Le midi</label>
            <br>

            <input type="radio" id="radio3" name="radio" value="radio3">
                <label for="radio1">Le soir</label>
            <br>

            <input type="radio" id="radio4" name="radio" value="radio4">
                <label for="radio1">En retard !</label>
        </fieldset>

        <fieldset>
            <legend>Fin du formulaire</legend>
            <label for="question">Vous en avez assez ?</label>
            <select name="pets" id="pet-select">
                <option value="">Choisissez une option</option>

                <optgroup label="Team pas encore">
                    <option value="plus">J'en veux plus !</option>
                    <option value="super">C'est super</option>
                </optgroup>

                <optgroup label="Team oula">
                    <option value="marre">J'en ai marre !</option>
                    <option value="pitie">Pitié !</option>
                </optgroup>
            </select>
            <br>
            <button type="submit" value="Envoyer">Envoyer</button>
            <button type="reset" value="Reset">Reset</button>

        </fieldset>
    </form>
    <h1>&#128187;</h1>

</body>
</html>
